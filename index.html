<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulipanes y Corazones</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;900&display=swap');

        /* Configuracion Base */
        *, *::after, *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-color: #020202;
            --tulip-color: #ff385c; 
            --stem-color: #1a5d5e;
            --leaf-color: #2c8c7a;
        }

        body {
            background-color: var(--dark-color);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            perspective: 1000px;
        }

        /* --- CORAZONES MEJORADOS --- */
        .heart {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #ff2e63;
            transform: rotate(-45deg);
            box-shadow: 0 0 15px #ff2e63;
            animation: floatHeart linear forwards;
            z-index: 5;
        }

        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #ff2e63;
            border-radius: 50%;
        }

        .heart::before { top: -8px; left: 0; }
        .heart::after { left: 8px; top: 0; }

        @keyframes floatHeart {
            0% { transform: rotate(-45deg) translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: rotate(-45deg) translateY(-100vh) scale(1.2); opacity: 0; }
        }

        /* --- CONTENEDOR DE FLORES --- */
        .flowers {
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 10;
            margin-bottom: 50px;
        }

        .flower {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 30px;
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite;
        }

        /* Capullo del Tulipán */
        .tulip__cap {
            position: relative;
            width: 8vmin;
            height: 10vmin;
            z-index: 11;
            animation: bloom 3s ease-out;
        }

        .tulip__petal {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 8vmin;
            height: 11vmin;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            background-color: var(--tulip-color);
            transform-origin: bottom center;
            box-shadow: inset 0 0 4vmin rgba(0,0,0,0.3);
        }

        /* Efecto de pétalos de tulipán */
        .tulip__petal--main {
            transform: translateX(-50%);
            z-index: 3;
        }

        .tulip__petal--side-left {
            transform: translateX(-75%) rotate(-20deg);
            filter: brightness(0.8);
            z-index: 2;
        }

        .tulip__petal--side-right {
            transform: translateX(-25%) rotate(20deg);
            filter: brightness(0.8);
            z-index: 2;
        }

        .tulip__petal--back {
            transform: translateX(-50%) scale(0.9);
            filter: brightness(0.6);
            z-index: 1;
            bottom: 1vmin;
        }

        /* Tallo y Hojas */
        .flower__line {
            height: 45vmin;
            width: 1.5vmin;
            background-image: linear-gradient(to top, #0a3335, var(--stem-color));
            border-radius: 2vmin;
            position: relative;
        }

        .leaf {
            position: absolute;
            width: 10vmin;
            height: 5vmin;
            background: var(--leaf-color);
            border-radius: 0 100% 0 100%;
            top: 40%;
            left: 1vmin;
            transform-origin: left;
            transform: rotate(-30deg);
        }

        .leaf--2 {
            top: 55%;
            left: -10vmin;
            border-radius: 100% 0 100% 0;
            transform-origin: right;
            transform: rotate(30deg);
        }

        /* --- TEXTO --- */
        .title {
            position: absolute;
            top: 15%;
            color: white;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            z-index: 20;
        }

        /* --- ANIMACIONES ADICIONALES --- */
        @keyframes bloom {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .flower--2 { animation-delay: -1s; }
        .flower--3 { animation-delay: -2s; }
    </style>
</head>
<body>

    <h1 class="title">TULIPANES PARA TI</h1>

    <div class="flowers">
        <div class="flower flower--1">
            <div class="tulip__cap">
                <div class="tulip__petal tulip__petal--back"></div>
                <div class="tulip__petal tulip__petal--side-left"></div>
                <div class="tulip__petal tulip__petal--side-right"></div>
                <div class="tulip__petal tulip__petal--main"></div>
            </div>
            <div class="flower__line">
                <div class="leaf"></div>
            </div>
        </div>

        <div class="flower flower--2">
            <div class="tulip__cap">
                <div class="tulip__petal tulip__petal--back" style="background: #ff5e7e;"></div>
                <div class="tulip__petal tulip__petal--side-left" style="background: #ff5e7e;"></div>
                <div class="tulip__petal tulip__petal--side-right" style="background: #ff5e7e;"></div>
                <div class="tulip__petal tulip__petal--main" style="background: #ff5e7e;"></div>
            </div>
            <div class="flower__line">
                <div class="leaf leaf--2"></div>
            </div>
        </div>

        <div class="flower flower--3">
            <div class="tulip__cap">
                <div class="tulip__petal tulip__petal--back" style="background: #ffb347;"></div>
                <div class="tulip__petal tulip__petal--side-left" style="background: #ffb347;"></div>
                <div class="tulip__petal tulip__petal--side-right" style="background: #ffb347;"></div>
                <div class="tulip__petal tulip__petal--main" style="background: #ffb347;"></div>
            </div>
            <div class="flower__line">
                <div class="leaf"></div>
            </div>
        </div>
    </div>

    <script>
        // Generador de corazones flotantes
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Posición aleatoria
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.bottom = "-20px";
            
            // Tamaño y duración aleatoria
            const size = Math.random() * 15 + 10;
            heart.style.width = size + "px";
            heart.style.height = size + "px";
            
            const duration = Math.random() * 3 + 4;
            heart.style.animationDuration = duration + "s";
            
            // Color aleatorio entre tonos rojos y rosas
            const colors = ['#ff2e63', '#ff5e7e', '#ff8a5c', '#ff204e'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            heart.style.backgroundColor = randomColor;
            heart.style.setProperty('--bg-color', randomColor); // Para los pseudoelementos

            // Aplicar color a los pseudoelementos dinámicamente
            const styleTag = document.createElement('style');
            styleTag.innerHTML = `
                .heart { background-color: var(--bg-color); }
                .heart::before, .heart::after { background-color: inherit; }
            `;
            
            document.body.appendChild(heart);

            // Eliminar corazón después de la animación
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Crear corazones continuamente
        setInterval(createHeart, 300);
    </script>
</body>
</html>
